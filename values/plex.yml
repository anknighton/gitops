pms:
  configStorage: 10Gi
extraEnv:
  PLEX_CLAIM: "claim-R1L3SwWsHrnpr8yYWSmQ"
  HOSTNAME: "Plex-k8s"
  PLEX_UID: "1000"
  PLEX_GID: "1000"
extraVolumes:
  - name: nfs-vol
    nfs:
      server: 192.168.1.5 
      path: /Pool/Media 
  - name: config
    nfs:
      server: 192.168.1.5
      path: /Pool/configs/plex
extraVolumeMounts:
  - name: nfs-vol
    mountPath: /media
  - name: config
    mountPath: /config