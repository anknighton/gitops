global:
  nameOverride: "media-stack"

defaultPodOptions:
  nodeSelector:
    kubernetes.io/hostname: ubuntu
  # securityContext:
  #   runAsUser: 1000
  #   runAsGroup: 1000
  #   fsGroup: 1000

controllers:
  # ---------------------------------------------------------
  # 1. PLEX CONTROLLER
  # ---------------------------------------------------------
  plex:
    enabled: true
    type: deployment
    pod:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/plex
          tag: latest
        env:
          TZ: "America/New_York"
          PUID: 1000
          PGID: 1000
  gluetun-stack:
    enabled: true
    type: deployment
    pod:
      nodeSelector:
        kubernetes.io/hostname: "ubuntu"
    
    containers:
      # --- GLUETUN ---
      gluetun:
        image:
          repository: qmcgaw/gluetun
          tag: latest
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
        env:
          - name: VPN_SERVICE_PROVIDER
            value: "windscribe"
          - name: VPN_TYPE
            value: "wireguard"
          - name: WIREGUARD_ADDRESSES
            value: "100.76.149.229/32"
          - name: SERVER_REGIONS
            value: "Canada East"
          - name: SERVER_CITIES
            value: "Toronto"
          - name: WIREGUARD_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: windscribe-creds                 
                key: wireguard_private_key       
          - name: WIREGUARD_PRESHARED_KEY
            valueFrom:
              secretKeyRef:
                name: windscribe-creds
                key: wireguard_preshared_key

      # # --- RADARR ---
      # radarr:
      #   image:
      #     repository: ghcr.io/onedr0p/radarr
      #     tag: 5.19.3
      #   env:
      #     TZ: "America/New_York"

      # # --- SONARR ---
      # sonarr:
      #   image:
      #     repository: ghcr.io/onedr0p/sonarr
      #     tag: 4.0.13
      #   env:
      #     TZ: "America/New_York"
      # --- qbittorrent ---
      qbittorrent:
        image:
          repository: lscr.io/linuxserver/qbittorrent
          tag: latest
        env:
          PUID: 1000
          PGID: 1000
          WEBUI_PORT: 8080
          TZ: "America/New_York"

# -----------------------------------------------------------------
# SERVICE NETWORKING (For Radarr/Sonarr Web UIs)
# -----------------------------------------------------------------
service:
  # radarr:
  #   controller: gluetun-stack
  #   type: LoadBalancer
  #   ports:
  #     http:
  #       port: 7878
  # sonarr:
  #   controller: gluetun-stack
  #   type: LoadBalancer
  #   ports:
  #     http:
  #       port: 8989
  qbittorrent:
    controller: gluetun-stack
    type: LoadBalancer
    ports:
      http:
        port: 8080 
      torrent-tcp:
        port: 6881
        protocol: TCP
      torrent-udp:
        port: 6881
        protocol: UDP


persistence:
  media:                             # 1. The name of this storage definition
    enabled: true
    type: hostPath
    hostPath: "/mnt/media"     # 2. The actual folder on your k3s agent node
    advancedMounts:
      plex:                          # 3. Target the 'plex' controller
        main:                        # 4. Target the 'main' container inside that pod
          - path: /data/media        # 5. The destination path INSIDE the container
      radarr:
        main:
          path: /movies
          subPath: movies
  configs:
    enabled: true
    type: hostPath
    hostPath: "/mnt/configs"
    advancedMounts:
      plex:
        main:
          - path: /config
            subPath: plex
      gluetun-stack:
        qbittorrent:
          - path: /config
            subPath: qbittorrent
  # Transcode in memory
  transcode:
    enabled: true
    type: emptyDir
    medium: Memory
    advancedMounts:
      plex:
        main:
          - path: /transcode
  downloads:
    enabled: true
    type: hostPath
    hostPath: "/downloads"    
    advancedMounts:
      gluetun-stack:                        
        qbittorrent:                      
          - path: /downloads
