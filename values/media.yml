global:
  nameOverride: "media-stack"

defaultPodOptions:
  nodeSelector:
    kubernetes.io/hostname: ubuntu
  # securityContext:
  #   runAsUser: 1000
  #   runAsGroup: 1000
  #   fsGroup: 1000

controllers:
  # ---------------------------------------------------------
  #  seerr CONTROLLER
  # ---------------------------------------------------------
  seerr:
    enabled: true
    type: deployment
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    containers:
      main: 
        image: 
          repository: ghcr.io/seerr-team/seerr
          tag: latest
        env:
          TZ: "America/New_York"
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
  # ---------------------------------------------------------
  # PLEX CONTROLLER
  # ---------------------------------------------------------
  plex:
    enabled: true
    type: deployment
    pod:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/plex
          tag: latest
        env:
          TZ: "America/New_York"
          PUID: 1000
          PGID: 1000
  # ---------------------------------------------------------
  #  gluetun CONTROLLER
  # ---------------------------------------------------------
  gluetun-stack:
    enabled: true
    type: deployment
    pod:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 1.1.1.1 
          - 9.9.9.9
    containers:
      # --- GLUETUN ---
      gluetun:
        image:
          repository: qmcgaw/gluetun
          tag: latest
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
        env:
          - name: VPN_SERVICE_PROVIDER
            value: "windscribe"
          - name: VPN_TYPE
            value: "wireguard"
          - name: WIREGUARD_ADDRESSES
            value: "100.76.149.229/32"
          - name: SERVER_REGIONS
            value: "Canada East"
          - name: SERVER_CITIES
            value: "Toronto"
          - name: WIREGUARD_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: windscribe-creds                 
                key: wireguard_private_key       
          - name: WIREGUARD_PRESHARED_KEY
            valueFrom:
              secretKeyRef:
                name: windscribe-creds
                key: wireguard_preshared_key
      # --- Jackett ---
      jackett:
        image:
          repository: linuxserver/jackett
          tag: latest
        env:
          TZ: "America/New_York"
          PUID: 1000
          PGID: 1000
      # --- RADARR ---
      radarr:
        image:
          repository: linuxserver/radarr
          tag: latest
        env:
          TZ: "America/New_York"
          PUID: 1000
          PGID: 1000
      # --- SONARR ---
      sonarr:
        image:
          repository: linuxserver/sonarr
          tag: latest
        env:
          TZ: "America/New_York"
          PUID: 1000
          PGID: 1000
      # --- qbittorrent ---
      qbittorrent:
        image:
          repository: lscr.io/linuxserver/qbittorrent
          tag: latest
        env:
          PUID: 1000
          PGID: 1000
          WEBUI_PORT: 8080
          TZ: "America/New_York"
      # --- prowlarr ---
      prowlarr:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: latest
        env:
          PUID: 1000
          PGID: 1000
          WEBUI_PORT: 8080
          TZ: "America/New_York"
      # --- byparr ---
      byparr:
        image: ghcr.io/theultimatecoder/byparr
        tag: latest

# -----------------------------------------------------------------
# SERVICE NETWORKING (For Radarr/Sonarr Web UIs)
# -----------------------------------------------------------------
service:
  seerr:
    controller: seerr
    type: LoadBalancer
    ports:
      http:
        port: 5055
  jackett:
    controller: gluetun-stack
    type: LoadBalancer
    ports:
      http:
        port: 9117
  radarr:
    controller: gluetun-stack
    type: LoadBalancer
    ports:
      http:
        port: 7878
  sonarr:
    controller: gluetun-stack
    type: LoadBalancer
    ports:
      http:
        port: 8989
  prowlarr:
    controller: gluetun-stack
    type: LoadBalancer
    ports:
      http:
        port: 9696
  byparr:
    controller: gluetun-stack
    type: LoadBalancer
    ports:
      http:
        port: 8191
  qbittorrent:
    controller: gluetun-stack
    type: LoadBalancer
    ports:
      http:
        port: 8080 
      torrent-tcp:
        port: 6881
        protocol: TCP
      torrent-udp:
        port: 6881
        protocol: UDP


persistence:
  media:                             # 1. The name of this storage definition
    enabled: true
    type: hostPath
    hostPath: "/mnt/media"     # 2. The actual folder on your k3s agent node
    advancedMounts:
      plex:                          # 3. Target the 'plex' controller
        main:                        # 4. Target the 'main' container inside that pod
          - path: /data/media        # 5. The destination path INSIDE the container
      gluetun-stack:  
        radarr:
          - path: /movies
            subPath: movies
        sonarr:
          - path: /tv
            subPath: tv
  configs:
    enabled: true
    type: hostPath
    hostPath: "/mnt/configs"
    advancedMounts:
      seerr:
        main:
          - path: /app/config
            subPath: seerr
      plex:
        main:
          - path: /config
            subPath: plex
      gluetun-stack:
        jackett:
          - path: /config
            subPath: jackett
        radarr:
          - path: /config
            subPath: radarr
        sonarr:
          - path: /config
            subPath: sonarr
        qbittorrent:
          - path: /config
            subPath: qbittorrent
        prowlarr:
          - path: /config
            subPath: prowlarr
  downloads:
    enabled: true
    type: hostPath
    hostPath: "/downloads"    
    advancedMounts:
      gluetun-stack: 
        jackett:                      
          - path: /downloads   
        radarr:                      
          - path: /downloads
        sonarr:                      
          - path: /downloads                    
        qbittorrent:                      
          - path: /downloads
    # Transcode in memory
  transcode:
    enabled: true
    type: emptyDir
    medium: Memory
    advancedMounts:
      plex:
        main:
          - path: /transcode
